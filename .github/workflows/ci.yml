name: CI

on:
  push:
    branches: [main, 'milestone-*']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      # TODO: Re-enable when golangci-lint supports Go 1.26
      # - name: Lint
      #   uses: golangci/golangci-lint-action@v7
      #   with:
      #     version: latest

  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Type check
        run: npx vue-tsc -b
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v5

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t nats-insight:test .
