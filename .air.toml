root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/nats-insight"
  cmd = "go build -o ./tmp/nats-insight ./cmd/nats-insight/"
  delay = 1000
  exclude_dir = ["web", "tmp", "vendor", "node_modules", "bin", "docker", "memos"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
